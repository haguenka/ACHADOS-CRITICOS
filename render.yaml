services:
  - type: web
    name: cdi-achados-criticos-dashboard
    env: python
    buildCommand: pip install -r achados_criticos/requirements_dashboard.txt
    startCommand: bash achados_criticos/start_render.sh
    healthCheckPath: /
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.11
      - key: STREAMLIT_SERVER_ENABLE_CORS
        value: "false"
      - key: STREAMLIT_SERVER_ENABLE_XSRF_PROTECTION
        value: "false"
